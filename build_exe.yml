# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  GitHub Actions 워크플로 - Windows .exe 자동 빌드
#
#  이 파일을 GitHub 저장소의 아래 경로에 놓으세요:
#    .github/workflows/build_exe.yml
#
#  설정 방법은 같은 폴더의 EXE_빌드_안내서.txt 참고
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Windows EXE 빌드

on:
  workflow_dispatch:   # GitHub 웹사이트에서 수동으로 실행

jobs:
  build-windows-exe:
    runs-on: windows-latest   # 무료 Windows 서버에서 실행

    steps:
      # 1) 저장소 코드 가져오기
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2) Python 설치
      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3) 필요한 라이브러리 설치
      - name: 라이브러리 설치 (requests, pyinstaller)
        run: pip install requests pyinstaller

      # 4) PyInstaller로 단일 .exe 파일 빌드
      #    --onefile  : 모든 것을 하나의 .exe로 묶음
      #    --noconsole: 실행 시 검은 터미널 창 숨김
      #    --name     : 생성될 파일 이름
      - name: EXE 빌드
        run: |
          pyinstaller --onefile --noconsole --name "일일업무브리핑" briefing.py

      # 5) 빌드된 .exe를 다운로드 가능한 아티팩트로 저장 (7일간 보관)
      - name: EXE 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: 일일업무브리핑-Windows
          path: dist/일일업무브리핑.exe
          retention-days: 7
